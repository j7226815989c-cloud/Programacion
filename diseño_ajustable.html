<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diseño Ajustable</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ESTILO ORIGINAL */
.my-bg-color{
    background: #0f172a;
    color: white;
    padding: 20px;
    text-align: center;
}

/* MEDIA QUERY (RESPONSIVE) */
@media (max-width: 768px){
    .my-bg-color{
        background: #9333ea;
        font-size: 18px;
    }
}
</style>

</head>

<body style="background:#f5f5f5;">

<div class="container mt-5">

    <h1 class="text-center mb-4">DISEÑO AJUSTABLE</h1>

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <!-- IMAGEN -->
                <img src="imagenes\diseño.jpg"
                     class="card-img-top"
                     style="height:250px; object-fit:cover;">

                <div class="card-body">

                    <h3 class="card-title">Responsive Design</h3>

                    <p class="card-text">
                        Uso de media queries para adaptar el diseño según el tamaño de pantalla.
                    </p>

                    <!-- BOTONES -->
                    <button class="btn btn-outline-primary" data-bs-toggle="collapse" data-bs-target="#ver">
                        View
                    </button>

                    <a href="archivotxt\ajustabel.txt" target="_blank" class="btn btn-outline-secondary">
                        Code
                    </a>

                    <!-- CONTENIDO -->
                    <div id="ver" class="collapse mt-3">

                        <div class="my-bg-color">
                            <p>Let's rock the browser, HTML5 style.</p>
                            <p>Web programming</p>
                        </div>

                        <p class="mt-3">
                            🔹 En pantallas grandes → fondo oscuro<br>
                            🔹 En pantallas pequeñas → cambia a morado (media query)
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
